name: ci
on:
  pull_request: {}
  push:
    branches:
      - master
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      AWS_PROFILE_NAME: builder
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      BINARY_CACHE_SECRET_KEY: ${{ secrets.BINARY_CACHE_SECRET_KEY }}
      S3_API_ENDPOINT: ${{ secrets.S3_API_ENDPOINT }}
      NIX_CACHE_BUCKET: ${{ secrets.NIX_CACHE_BUCKET }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/determinate-nix-action@4eea0b33e3d1f02ecfe37cf16e7204c424009606 # v3.21.0
      - run: |
          nix shell nixpkgs#awscli2 --command aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID" --profile "$AWS_PROFILE_NAME"
          nix shell nixpkgs#awscli2 --command aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY" --profile "$AWS_PROFILE_NAME"
          nix shell nixpkgs#awscli2 --command aws configure set region auto --profile "$AWS_PROFILE_NAME"
        shell: bash
      - run: nix build --accept-flake-config --print-build-logs '.#darwinConfigurations.M4MacBookAir.system'
      - run: |
          secret_key_path="${RUNNER_TEMP}/secret.key"
          printf '%s\n' "$BINARY_CACHE_SECRET_KEY" > "$secret_key_path"
          nix copy --all --to "s3://${NIX_CACHE_BUCKET}?profile=${AWS_PROFILE_NAME}&endpoint=${S3_API_ENDPOINT}&region=auto&compression=zstd&secret-key=${secret_key_path}"
        shell: bash
        if: always()
  dependabot-auto-merge:
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - run: gh pr merge --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
